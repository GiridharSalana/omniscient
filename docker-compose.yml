networks:
  omniscient:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  omniscient_data:   # used by the single-container profile

services:
  # ─────────────────────────────────────────────────────────────────
  # ALL-IN-ONE (single container — profile: single)
  #
  #   docker compose --profile single up -d
  #   docker ps   → one entry: omniscient
  #
  # ─────────────────────────────────────────────────────────────────
  omniscient:
    build:
      context: .
      dockerfile: Dockerfile
    image: oms:latest
    container_name: oms
    profiles: [single]
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-omniscient_secret}
    ports:
      - "3000:3000"
      - "8000:8000"
    volumes:
      - omniscient_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ─────────────────────────────────────────────────────────────────
  # MULTI-SERVICE (default — no profile needed)
  # ─────────────────────────────────────────────────────────────────

  # ─────────────────────────────────────────────────────────────────
  # PostgreSQL 15 + pgvector
  # ─────────────────────────────────────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg15
    container_name: omniscient-postgres
    profiles: [multi]
    restart: unless-stopped
    environment:
      POSTGRES_DB: omniscient
      POSTGRES_USER: omniscient
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-omniscient_secret}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/sql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    networks:
      - omniscient
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U omniscient -d omniscient"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ─────────────────────────────────────────────────────────────────
  # Redis 7
  # ─────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: omniscient-redis
    profiles: [multi]
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - omniscient
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ─────────────────────────────────────────────────────────────────
  # Backend — FastAPI
  # ─────────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: omniscient-backend
    profiles: [multi]
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://omniscient:${POSTGRES_PASSWORD:-omniscient_secret}@postgres:5432/omniscient
      SYNC_DATABASE_URL: postgresql://omniscient:${POSTGRES_PASSWORD:-omniscient_secret}@postgres:5432/omniscient
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8000:8000"
    networks:
      - omniscient
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    volumes:
      - ./backend:/app:cached

  # ─────────────────────────────────────────────────────────────────
  # Scheduler — Cron jobs
  # ─────────────────────────────────────────────────────────────────
  scheduler:
    build:
      context: ./scheduler
      dockerfile: Dockerfile
    container_name: omniscient-scheduler
    profiles: [multi]
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql://omniscient:${POSTGRES_PASSWORD:-omniscient_secret}@postgres:5432/omniscient
      REDIS_URL: redis://redis:6379/0
      BACKEND_URL: http://backend:8000
    networks:
      - omniscient
    depends_on:
      backend:
        condition: service_healthy
    volumes:
      - ./scheduler:/app:cached

  # ─────────────────────────────────────────────────────────────────
  # Frontend — Next.js (production build)
  # ─────────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: production
    container_name: omniscient-frontend
    profiles: [multi]
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
      NEXT_PUBLIC_WS_URL: ws://localhost:8000
      NODE_ENV: production
      HOSTNAME: "0.0.0.0"
    ports:
      - "3000:3000"
    networks:
      - omniscient
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
